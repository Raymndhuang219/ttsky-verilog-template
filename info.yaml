# Tiny Tapeout project information
project:
  title:        "Reaction Time Tester"
  author:       "Raymond Huang"
  discord:      ""      # Your discord username (optional)
  description:  "A 3-digit reaction time tester that measures how fast you press a button after a random delay, displayed on 7-segment displays in milliseconds."
  language:     "Verilog"
  clock_hz:     50000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_reaction_timer"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Button (start / react)"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "7-segment segment A"
  uo[1]: "7-segment segment B"
  uo[2]: "7-segment segment C"
  uo[3]: "7-segment segment D"
  uo[4]: "7-segment segment E"
  uo[5]: "7-segment segment F"
  uo[6]: "7-segment segment G"
  uo[7]: "7-segment decimal point (dp)"

  # Bidirectional pins
  uio[0]: "Digit select - units"
  uio[1]: "Digit select - tens"
  uio[2]: "Digit select - hundreds"
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6